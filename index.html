<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Sneaker Showcase | Cinematic 3D Experience</title>
    <meta name="description" content="An ultra-realistic cinematic 3D sneaker showcase with exploded view, particle effects, and premium product visualization.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader-content">
            <div class="loader-logo">
                <span class="logo-text">SNEAKER</span>
                <span class="logo-sub">SHOWCASE</span>
            </div>
            <div class="loader-bar-container">
                <div class="loader-bar" id="loader-bar"></div>
            </div>
            <p class="loader-hint">Preparing cinematic experience...</p>
        </div>
    </div>

    <!-- Atmospheric Gradient Blinds Background -->
    <div id="gradient-blinds-container"></div>

    <!-- Canvas -->
    <canvas id="webgl-canvas"></canvas>

    <!-- UI Overlay -->
    <div id="ui-overlay">
        <div class="top-bar">
            <div class="brand-mark">PREMIUM COLLECTION</div>
            <div class="nav-dots">
                <span class="dot active" data-phase="0"></span>
                <span class="dot" data-phase="1"></span>
                <span class="dot" data-phase="2"></span>
                <span class="dot" data-phase="3"></span>
                <span class="dot" data-phase="4"></span>
            </div>
        </div>

        <div class="phase-label" id="phase-label">
            <span class="phase-tag">01</span>
            <span class="phase-title">THE REVEAL</span>
        </div>

        <div class="bottom-bar">
            <div class="info-left">
                <span class="shoe-name">AIR FORCE ELITE</span>
                <span class="shoe-detail">BEIGE / BROWN COLORWAY</span>
            </div>
            <div class="info-right">
                <button id="replay-btn" class="replay-btn" title="Replay Animation">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                    </svg>
                    REPLAY
                </button>
            </div>
        </div>

        <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <!-- Feature Callouts (shown during exploded view) -->
    <div id="callouts" class="callouts hidden">
        <div class="callout" id="callout-sole" style="--delay: 0.1s">
            <div class="callout-line"></div>
            <div class="callout-text">
                <strong>AIR CUSHION SOLE</strong>
                <span>Premium impact absorption</span>
            </div>
        </div>
        <div class="callout" id="callout-upper" style="--delay: 0.3s">
            <div class="callout-line"></div>
            <div class="callout-text">
                <strong>PREMIUM LEATHER</strong>
                <span>Full-grain tumbled leather</span>
            </div>
        </div>
        <div class="callout" id="callout-tongue" style="--delay: 0.5s">
            <div class="callout-line"></div>
            <div class="callout-text">
                <strong>PADDED TONGUE</strong>
                <span>Comfort-fit cushioning</span>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
